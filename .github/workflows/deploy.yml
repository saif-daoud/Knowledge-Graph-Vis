name: Deploy Knowledge Graph Vis

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_PROJECT_NAME: knowledge-graph-vis
      PAGES_PRODUCTION_BRANCH: main
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          VITE_ACCESS_CODE_HASH: ${{ secrets.VITE_ACCESS_CODE_HASH }}

      - name: Ensure Cloudflare Pages project exists
        run: |
          set -euo pipefail

          npx --yes wrangler@4.101.0 pages project create "${PAGES_PROJECT_NAME}" --production-branch "${PAGES_PRODUCTION_BRANCH}" \
            || echo "Cloudflare Pages project '${PAGES_PROJECT_NAME}' already exists or could not be created; continuing to deploy."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4.101.0 pages deploy dist --project-name "${PAGES_PROJECT_NAME}" --branch "${PAGES_PRODUCTION_BRANCH}" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
